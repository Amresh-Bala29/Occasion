services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports: ["3000:3000"]
    env_file: [apps/web/.env.local]
    depends_on: [agent]

  agent:
    build:
      context: .
      dockerfile: infra/docker/agent.Dockerfile
    ports: ["8000:8000"]
    env_file: [services/agent/.env]
    depends_on: [db]

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: occasion
    ports: ["5432:5432"]
    volumes: ["occasion-db:/var/lib/postgresql/data"]

volumes:
  occasion-db:
