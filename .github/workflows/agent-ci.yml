name: agent-ci
on:
  push:
    paths: ["services/agent/**", ".github/workflows/agent-ci.yml"]
  pull_request:
    paths: ["services/agent/**", ".github/workflows/agent-ci.yml"]
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: pytest -q
